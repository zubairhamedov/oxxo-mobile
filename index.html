<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OXXO MOBILE</title>
  <style>
    :root{--gold:#C9A84C;--gold2:#E8C97A;--dark:#0A0A0A;--card:#141414;--card2:#1E1E1E;--border:#2A2A2A;--text:#FFFFFF;--muted:#666}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(201,168,76,0.2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:12px}
    .logo img{width:42px;height:42px;border-radius:10px;object-fit:cover;border:1px solid rgba(201,168,76,0.3)}
    .logo-text .name{font-size:18px;font-weight:800;letter-spacing:2px;color:var(--gold2)}
    .logo-text .sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
    .live-badge{display:flex;align-items:center;gap:5px;background:rgba(201,168,76,0.1);border:0.5px solid rgba(201,168,76,0.3);color:var(--gold2);padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600}
    .live-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    .hero{margin:14px;border-radius:20px;padding:28px 20px 24px;background:linear-gradient(145deg,#0a0a0a,#1a1400,#2a1f00);position:relative;overflow:hidden;border:0.5px solid rgba(201,168,76,0.2)}
    .hero-glow{position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.15),transparent 70%);animation:glow 6s ease-in-out infinite}
    @keyframes glow{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,20px)}}
    .hero-logo{width:90px;height:90px;border-radius:18px;object-fit:cover;margin-bottom:14px;border:1px solid rgba(201,168,76,0.3);box-shadow:0 0 30px rgba(201,168,76,0.2);position:relative}
    .hero h2{font-size:30px;font-weight:900;letter-spacing:3px;color:var(--gold2);margin-bottom:4px;position:relative}
    .hero-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;position:relative}
    .hero-contacts{display:flex;gap:8px;flex-wrap:wrap;position:relative}
    .hc-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:12px;font-weight:600;font-size:12px;text-decoration:none;transition:transform 0.15s,opacity 0.15s;letter-spacing:0.3px}
    .hc-btn:active{transform:scale(0.95);opacity:0.8}
    .hc-call{background:var(--gold);color:#000}
    .hc-wa{background:#25D366;color:white}
    .hc-tg{background:#2AABEE;color:white}
    .hc-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:white}

    .search-wrap{padding:12px 14px 6px;position:relative}
    .search-input{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:11px 16px 11px 40px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
    .search-input::placeholder{color:var(--muted)}
    .search-input:focus{border-color:rgba(201,168,76,0.4)}
    .search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}

    .cats{display:flex;gap:8px;padding:10px 14px 4px;overflow-x:auto;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .cat-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit}
    .cat-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}

    .sort-bar{display:flex;gap:8px;padding:8px 14px 10px;overflow-x:auto;scrollbar-width:none}
    .sort-bar::-webkit-scrollbar{display:none}
    .sort-btn{flex-shrink:0;padding:5px 12px;border-radius:8px;border:0.5px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .sort-btn.active{background:rgba(201,168,76,0.15);color:var(--gold2);border-color:rgba(201,168,76,0.3)}

    .section-head{padding:4px 16px 8px;display:flex;align-items:center;justify-content:space-between}
    .section-head h3{font-size:20px;font-weight:700;letter-spacing:-0.3px}
    .count-badge{background:var(--card2);color:var(--muted);font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px}

    .products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 14px 40px}
    .card{background:var(--card);border-radius:16px;overflow:hidden;border:0.5px solid var(--border);cursor:pointer;transition:transform 0.2s;animation:fadeUp 0.4s ease both}
    .card:active{transform:scale(0.97)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-img-wrap{position:relative;overflow:hidden}
    .card-img{width:100%;height:150px;object-fit:cover;display:block;background:var(--card2);transition:transform 0.3s}
    .card:active .card-img{transform:scale(1.03)}
    .card-cat-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);color:var(--gold2);font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:0.5px;border:0.5px solid rgba(201,168,76,0.3)}
    .card-body{padding:10px}
    .card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-price{font-size:16px;font-weight:800;color:var(--gold2);margin-bottom:8px;letter-spacing:-0.3px}
    .card-specs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
    .card-spec-tag{background:var(--card2);color:var(--muted);font-size:9px;font-weight:500;padding:3px 7px;border-radius:6px}
    .call-btn{display:flex;align-items:center;justify-content:center;gap:5px;background:var(--gold);color:#000;text-decoration:none;padding:9px 0;border-radius:10px;font-size:12px;font-weight:700}

    .loading-wrap{grid-column:1/-1;text-align:center;padding:60px 20px}
    .spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-wrap p,.empty p{color:var(--muted);font-size:14px}
    .empty{grid-column:1/-1;text-align:center;padding:60px 20px}
    .empty-icon{font-size:48px;margin-bottom:12px}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex;animation:fadeIn 0.2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:#141414;border-radius:20px 20px 0 0;border-top:0.5px solid rgba(201,168,76,0.2);padding:0 0 34px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp 0.35s cubic-bezier(0.32,0.72,0,1)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle-wrap{padding:10px 0 0;display:flex;justify-content:center}
    .modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px}
    .modal-img{width:100%;height:250px;object-fit:cover;display:block}
    .modal-body{padding:16px 18px 0}
    .modal-cat{display:inline-block;background:rgba(201,168,76,0.1);color:var(--gold2);padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;border:0.5px solid rgba(201,168,76,0.2)}
    .modal-name{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
    .modal-price{font-size:30px;font-weight:900;color:var(--gold2);letter-spacing:-1px;margin-bottom:16px}
    .specs-section{margin-bottom:18px}
    .specs-title{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
    .specs-list{display:flex;flex-direction:column;gap:6px}
    .spec-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--card2);border-radius:10px}
    .spec-row .sk{font-size:12px;color:var(--muted)}
    .spec-row .sv{font-size:13px;font-weight:600;color:var(--text)}
    .modal-actions{padding:0 18px;display:flex;flex-direction:column;gap:10px}
    .ma-row{display:flex;gap:10px}
    .ma-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;font-weight:600;font-size:14px;text-decoration:none;transition:opacity 0.2s;border:none;cursor:pointer;font-family:inherit}
    .ma-btn:active{opacity:0.75}
    .ma-call{background:var(--gold);color:#000}
    .ma-wa{background:#25D366;color:white}
    .ma-tg{background:#2AABEE;color:white}
    .ma-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:white}
    .ma-close{background:var(--card2);color:var(--muted)}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="LOGO_URL" alt="OXXO">
    <div class="logo-text">
      <div class="name">OXXO MOBILE</div>
      <div class="sub">Premium Tech Store</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<div class="hero">
  <div class="hero-glow"></div>
  <img class="hero-logo" src="LOGO_URL" alt="OXXO">
  <h2>OXXO MOBILE</h2>
  <div class="hero-sub">Premium Tech Store</div>
  <div class="hero-contacts">
    <a class="hc-btn hc-call" href="tel:HERO_PHONE">📞 Qo'ng'iroq</a>
    <a class="hc-btn hc-wa" href="https://wa.me/HERO_WA" target="_blank">💬 WhatsApp</a>
    <a class="hc-btn hc-tg" href="https://t.me/HERO_TG" target="_blank">✈️ Telegram</a>
    <a class="hc-btn hc-ig" href="https://instagram.com/HERO_IG" target="_blank">📸 Instagram</a>
  </div>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="search" placeholder="Mahsulot qidirish..." oninput="renderProducts()">
</div>

<div class="cats">
  <button class="cat-btn active" onclick="filterCat('all',this)">🏠 Barchasi</button>
  <button class="cat-btn" onclick="filterCat('telefon',this)">📱 Telefon</button>
  <button class="cat-btn" onclick="filterCat('aksessuar',this)">🎧 Aksessuar</button>
</div>

<div class="section-head">
  <h3>Mahsulotlar</h3>
  <span class="count-badge" id="count">0</span>
</div>

<div class="sort-bar">
  <button class="sort-btn active" onclick="sortBy('new',this)">🆕 Yangi</button>
  <button class="sort-btn" onclick="sortBy('cheap',this)">💰 Arzon</button>
  <button class="sort-btn" onclick="sortBy('expensive',this)">💎 Qimmat</button>
</div>

<div class="products" id="products">
  <div class="loading-wrap"><div class="spinner"></div><p>Yuklanmoqda...</p></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle-wrap"><div class="modal-handle"></div></div>
    <img class="modal-img" id="m-img" src="" alt="">
    <div class="modal-body">
      <div class="modal-cat" id="m-cat"></div>
      <div class="modal-name" id="m-name"></div>
      <div class="modal-price" id="m-price"></div>
      <div class="specs-section" id="m-specs-wrap" style="display:none">
        <div class="specs-title">Характеристикалар</div>
        <div class="specs-list" id="m-specs"></div>
      </div>
    </div>
    <div class="modal-actions">
      <div class="ma-row">
        <a class="ma-btn ma-call" id="m-call" href="">📞 Qo'ng'iroq</a>
        <a class="ma-btn ma-wa" id="m-wa" href="" target="_blank">💬 WhatsApp</a>
      </div>
      <div class="ma-row">
        <a class="ma-btn ma-tg" id="m-tg" href="" target="_blank">✈️ Telegram</a>
        <a class="ma-btn ma-ig" id="m-ig" href="" target="_blank">📸 Instagram</a>
      </div>
      <button class="ma-btn ma-close" onclick="document.getElementById('modal').classList.remove('open')">Yopish</button>
    </div>
  </div>
</div>

<script>
  let allProducts=[];
  let currentCat='all';
  let currentSort='new';

  async function loadProducts(){
    try{
      const res=await fetch('/api/get-products');
      allProducts=await res.json();
      renderProducts();
    }catch(e){
      document.getElementById('products').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Xatolik yuz berdi</p></div>';
    }
  }

  function filterCat(cat,btn){
    currentCat=cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    renderProducts();
  }

  function sortBy(type,btn){
    currentSort=type;
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    renderProducts();
  }

  function renderProducts(){
    const search=document.getElementById('search').value.toLowerCase();
    let filtered=currentCat==='all'?[...allProducts]:allProducts.filter(p=>p.category===currentCat);
    if(search)filtered=filtered.filter(p=>p.name.toLowerCase().includes(search));
    if(currentSort==='cheap')filtered.sort((a,b)=>Number(a.price)-Number(b.price));
    else if(currentSort==='expensive')filtered.sort((a,b)=>Number(b.price)-Number(a.price));
    document.getElementById('count').textContent=filtered.length;
    const container=document.getElementById('products');
    if(!filtered.length){
      container.innerHTML='<div class="empty"><div class="empty-icon">📦</div><p>Hozircha mahsulot yo\'q</p></div>';
      return;
    }
    container.innerHTML=filtered.map((p,i)=>{
      const specs=Array.isArray(p.specs)?p.specs:[];
      const firstSpecs=specs.slice(0,3);
      return `
        <div class="card" style="animation-delay:${i*0.05}s" onclick="openModal('${p.id}')">
          <div class="card-img-wrap">
            <img class="card-img" src="${p.image_url}" alt="${p.name}" onerror="this.style.background='#1E1E1E'">
            <div class="card-cat-badge">${p.category==='telefon'?'📱 Telefon':'🎧 Aksessuar'}</div>
          </div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-price">${Number(p.price).toLocaleString()} so'm</div>
            <div class="card-specs">
              ${firstSpecs.map(s=>`<span class="card-spec-tag">${s.k}: ${s.v}</span>`).join('')}
            </div>
            <a class="call-btn" href="tel:${p.phone||''}" onclick="event.stopPropagation()">📞 Qo'ng'iroq</a>
          </div>
        </div>
      `;
    }).join('');
  }

  function openModal(id){
    const p=allProducts.find(x=>x.id===id);if(!p)return;
    document.getElementById('m-img').src=p.image_url;
    document.getElementById('m-cat').textContent=p.category==='telefon'?'📱 Telefon':'🎧 Aksessuar';
    document.getElementById('m-name').textContent=p.name;
    document.getElementById('m-price').textContent=Number(p.price).toLocaleString()+' so\'m';

    const phone=p.phone||'';
    const wa=p.whatsapp||phone;
    const tg=p.telegram||'';
    const ig=p.instagram||'';

    document.getElementById('m-call').href='tel:'+phone;
    document.getElementById('m-wa').href='https://wa.me/'+(wa.replace(/\D/g,''));
    document.getElementById('m-tg').href=tg.startsWith('http')?tg:'https://t.me/'+tg.replace('@','');
    document.getElementById('m-ig').href=ig.startsWith('http')?ig:'https://instagram.com/'+ig.replace('@','');

    const specs=Array.isArray(p.specs)?p.specs:[];
    const specsWrap=document.getElementById('m-specs-wrap');
    const specsList=document.getElementById('m-specs');
    if(specs.length){
      specsWrap.style.display='block';
      specsList.innerHTML=specs.map(s=>`
        <div class="spec-row">
          <span class="sk">${s.k}</span>
          <span class="sv">${s.v}</span>
        </div>
      `).join('');
    }else{
      specsWrap.style.display='none';
      specsList.innerHTML='';
    }
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e){
    if(e.target===document.getElementById('modal'))
      document.getElementById('modal').classList.remove('open');
  }

  loadProducts();
</script>
</body>
</html>
