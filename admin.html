<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ — OXXO MOBILE</title>
  <style>
    :root{--gold:#C9A84C;--gold2:#E8C97A;--dark:#0A0A0A;--card:#141414;--card2:#1E1E1E;--border:#2A2A2A;--text:#FFF;--muted:#666;--red:#FF453A;--green:#30D158}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
    #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1a1400,#0a0a0a)}
    .login-logo{width:90px;height:90px;border-radius:20px;object-fit:cover;margin-bottom:16px;border:1px solid rgba(201,168,76,0.3);box-shadow:0 0 30px rgba(201,168,76,0.2)}
    .login-title{font-size:26px;font-weight:900;letter-spacing:3px;color:var(--gold2);margin-bottom:4px}
    .login-sub{color:var(--muted);font-size:13px;letter-spacing:1px;margin-bottom:28px}
    .input-wrap{width:100%;max-width:340px;position:relative;margin-bottom:12px}
    .input-wrap input{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:15px 48px 15px 16px;color:var(--text);font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
    .input-wrap input:focus{border-color:rgba(201,168,76,0.5)}
    .input-wrap input.error{border-color:var(--red);animation:shake 0.4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
    .login-btn{width:100%;max-width:340px;background:var(--gold);color:#000;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity 0.2s}
    .login-btn:active{opacity:0.8}
    .error-msg{color:var(--red);font-size:13px;margin-top:10px;display:none;text-align:center}
    #admin-screen{display:none}
    header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(201,168,76,0.15);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px}
    .logo img{width:34px;height:34px;border-radius:8px;object-fit:cover;border:0.5px solid rgba(201,168,76,0.3)}
    .logo-text .name{font-size:15px;font-weight:800;letter-spacing:1px;color:var(--gold2)}
    .logo-text .sub{font-size:11px;color:var(--muted)}
    .logout-btn{background:rgba(255,69,58,0.1);border:0.5px solid rgba(255,69,58,0.3);color:var(--red);padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
    .stat-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px}
    .stat-card .sl{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
    .stat-card .sv{font-size:26px;font-weight:800;color:var(--gold2)}
    .tabs{display:flex;margin:0 16px 16px;background:var(--card);border-radius:12px;padding:3px;border:0.5px solid var(--border)}
    .tab-btn{flex:1;padding:9px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .tab-btn.active{background:var(--gold);color:#000}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .form-section{padding:0 16px 20px}
    .form-title{font-size:18px;font-weight:700;margin-bottom:16px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;letter-spacing:0.5px;text-transform:uppercase}
    .field input,.field select{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
    .field input:focus,.field select:focus{border-color:rgba(201,168,76,0.4)}
    .field input::placeholder{color:#333}
    .field select option{background:#141414}
    .section-sep{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 10px;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
    .specs-builder-title{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase}
    .spec-item-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
    .spec-item-row input{flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
    .spec-item-row input:focus{border-color:rgba(201,168,76,0.4)}
    .spec-item-row input::placeholder{color:#333}
    .remove-spec{background:rgba(255,69,58,0.1);border:0.5px solid rgba(255,69,58,0.2);color:var(--red);padding:10px 12px;border-radius:8px;font-size:14px;cursor:pointer;flex-shrink:0}
    .add-spec-btn{width:100%;background:rgba(201,168,76,0.1);border:0.5px solid rgba(201,168,76,0.2);color:var(--gold2);padding:11px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:4px}
    .add-spec-btn:active{background:rgba(201,168,76,0.2)}
    .img-upload{width:100%;border:1.5px dashed var(--border);border-radius:14px;padding:24px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s}
    .img-upload:active{border-color:var(--gold)}
    .img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .up-icon{font-size:30px;margin-bottom:8px}
    .up-label{color:var(--gold2);font-weight:600;font-size:14px;margin-bottom:4px}
    .up-sub{color:var(--muted);font-size:13px}
    #preview-wrap{display:none;margin-top:12px;position:relative}
    #preview-wrap img{width:100%;border-radius:12px;max-height:200px;object-fit:cover}
    .remove-img{position:absolute;top:8px;right:8px;background:rgba(255,69,58,0.9);color:white;border:none;border-radius:50%;width:28px;height:28px;font-size:13px;cursor:pointer}
    .submit-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
    .submit-btn:disabled{opacity:0.5}
    .submit-btn:active{opacity:0.8}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:30px;font-weight:600;font-size:14px;transition:transform 0.3s ease;z-index:999;white-space:nowrap;background:var(--card2);color:var(--text)}
    .toast.success{background:#1c2a1c;color:var(--green);border:0.5px solid rgba(48,209,88,0.3)}
    .toast.error-toast{background:#2a1c1c;color:var(--red);border:0.5px solid rgba(255,69,58,0.3)}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .list-section{padding:0 16px 100px}
    .list-title{font-size:18px;font-weight:700;margin-bottom:14px}
    .prod-item{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:center;animation:fadeUp 0.4s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .prod-item img{width:60px;height:60px;border-radius:10px;object-fit:cover;background:var(--card2);flex-shrink:0}
    .prod-info{flex:1;min-width:0}
    .p-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .p-price{color:var(--gold2);font-weight:700;font-size:13px;margin-bottom:2px}
    .p-cat{color:var(--muted);font-size:11px}
    .item-btns{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
    .edit-btn{background:rgba(201,168,76,0.1);border:0.5px solid rgba(201,168,76,0.2);color:var(--gold2);padding:7px 10px;border-radius:8px;font-size:14px;cursor:pointer}
    .delete-btn{background:rgba(255,69,58,0.1);border:0.5px solid rgba(255,69,58,0.2);color:var(--red);padding:7px 10px;border-radius:8px;font-size:14px;cursor:pointer}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(16px);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex;animation:fadeIn 0.2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .edit-modal{background:#141414;border-radius:20px 20px 0 0;border-top:0.5px solid rgba(201,168,76,0.2);padding:20px 18px 34px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.35s cubic-bezier(0.32,0.72,0,1)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 16px}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
    .save-btn{width:100%;background:var(--gold);color:#000;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
    .cancel-btn{width:100%;background:var(--card2);border:none;color:var(--muted);padding:13px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
  </style>
</head>
<body>

<div id="login-screen">
  <img class="login-logo" src="https://dqldbjhncchdaftbzvwf.supabase.co/storage/v1/object/public/products/IMG_6043.jpeg" alt="OXXO">
  <div class="login-title">OXXO MOBILE</div>
  <div class="login-sub">Панель администратора</div>
  <div class="input-wrap">
    <input type="password" id="pwd-input" placeholder="Пароль..."/>
    <button class="eye-btn" onclick="toggleEye()">👁</button>
  </div>
  <button class="login-btn" onclick="checkLogin()">Войти</button>
  <p class="error-msg" id="err-msg">❌ Неверный пароль!</p>
</div>

<div id="admin-screen">
  <header>
    <div class="logo">
      <img src="https://dqldbjhncchdaftbzvwf.supabase.co/storage/v1/object/public/products/IMG_6043.jpeg" alt="OXXO">
      <div class="logo-text">
        <div class="name">OXXO MOBILE</div>
        <div class="sub">Панель администратора</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Выйти</button>
  </header>

  <div class="stats">
    <div class="stat-card"><div class="sl">Всего товаров</div><div class="sv" id="total-count">0</div></div>
    <div class="stat-card"><div class="sl">Статус</div><div class="sv" style="color:var(--green);font-size:15px;padding-top:6px">✅ Активен</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('add',this)">➕ Добавить</button>
    <button class="tab-btn" onclick="switchTab('list',this)">📦 Товары</button>
  </div>

  <div id="tab-add" class="tab-content active">
    <div class="form-section">
      <div class="form-title">Новый товар</div>
      <div class="field">
        <label>Категория</label>
        <select id="p-cat">
          <option value="telefon">📱 Телефон</option>
          <option value="aksessuar">🎧 Аксессуар</option>
        </select>
      </div>
      <div class="field"><label>Название товара</label><input type="text" id="p-name" placeholder="iPhone 15 Pro Max 256GB"/></div>
      <div class="field"><label>Цена (сом)</label><input type="number" id="p-price" placeholder="12000000"/></div>

      <div class="section-sep">📋 Характеристики</div>
      <div class="specs-builder-title">Добавьте характеристики товара</div>
      <div id="specs-list"></div>
      <button class="add-spec-btn" onclick="addSpecRow()">＋ Добавить характеристику</button>

      <div class="section-sep">📞 Контакты</div>
      <div class="field"><label>Номер телефона</label><input type="tel" id="p-phone" placeholder="+996997606060"/></div>
      <div class="field"><label>WhatsApp</label><input type="tel" id="p-whatsapp" placeholder="+996997606060"/></div>
      <div class="field"><label>Telegram (username)</label><input type="text" id="p-telegram" placeholder="username (без @)"/></div>
      <div class="field"><label>Instagram (username)</label><input type="text" id="p-instagram" placeholder="username (без @)"/></div>

      <div class="section-sep">🖼️ Фото</div>
      <div class="img-upload" id="upload-area">
        <input type="file" id="img-input" accept="image/*" onchange="previewImg(this)"/>
        <div class="up-icon">🖼️</div>
        <div class="up-label">Выбрать фото</div>
        <div class="up-sub">Выберите из галереи</div>
      </div>
      <div id="preview-wrap">
        <img id="preview-img" src="" alt=""/>
        <button class="remove-img" onclick="removeImg()">✕</button>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="addProduct()">➕ Добавить товар</button>
    </div>
  </div>

  <div id="tab-list" class="tab-content">
    <div class="list-section">
      <div class="list-title">📦 Все товары</div>
      <div id="prod-list"></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="edit-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Редактировать</div>
    <input type="hidden" id="e-id"/>
    <div class="field"><label>Категория</label>
      <select id="e-cat">
        <option value="telefon">📱 Телефон</option>
        <option value="aksessuar">🎧 Аксессуар</option>
      </select>
    </div>
    <div class="field"><label>Название</label><input type="text" id="e-name"/></div>
    <div class="field"><label>Цена</label><input type="number" id="e-price"/></div>
    <div class="section-sep">📋 Характеристики</div>
    <div id="e-specs-list"></div>
    <button class="add-spec-btn" onclick="addEditSpecRow()">＋ Добавить характеристику</button>
    <div class="section-sep">📞 Контакты</div>
    <div class="field"><label>Телефон</label><input type="tel" id="e-phone"/></div>
    <div class="field"><label>WhatsApp</label><input type="tel" id="e-whatsapp"/></div>
    <div class="field"><label>Telegram</label><input type="text" id="e-telegram"/></div>
    <div class="field"><label>Instagram</label><input type="text" id="e-instagram"/></div>
    <button class="save-btn" onclick="saveEdit()">💾 Сохранить</button>
    <button class="cancel-btn" onclick="document.getElementById('edit-modal').classList.remove('open')">Отмена</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminPassword='';
  let products=[];
  let specCount=0;
  let editSpecCount=0;

  async function checkLogin(){
    const pwd=document.getElementById('pwd-input').value;
    if(!pwd)return;
    const inp=document.getElementById('pwd-input');
    try{
      const res=await fetch('/api/add-product',{
        method:'DELETE',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:pwd,id:'00000000-0000-0000-0000-000000000000'})
      });
      if(res.status===401){
        inp.classList.add('error');
        document.getElementById('err-msg').style.display='block';
        setTimeout(()=>inp.classList.remove('error'),400);
        return;
      }
    }catch(e){}
    adminPassword=pwd;
    document.getElementById('err-msg').style.display='none';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    loadProducts();
  }

  document.getElementById('pwd-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkLogin()});
  function toggleEye(){const i=document.getElementById('pwd-input');i.type=i.type==='password'?'text':'password'}
  function logout(){adminPassword='';document.getElementById('admin-screen').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('pwd-input').value=''}
  function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.className='toast',3000)}
  function switchTab(tab,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active')}

  function addSpecRow(k='',v=''){
    const id=specCount++;
    const row=document.createElement('div');
    row.className='spec-item-row';
    row.innerHTML=`
      <input type="text" placeholder="Параметр (RAM, Цвет...)" value="${k}" id="spec-k-${id}"/>
      <input type="text" placeholder="Значение (8GB, Чёрный...)" value="${v}" id="spec-v-${id}"/>
      <button class="remove-spec" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('specs-list').appendChild(row);
  }

  function addEditSpecRow(k='',v=''){
    const id=editSpecCount++;
    const row=document.createElement('div');
    row.className='spec-item-row';
    row.innerHTML=`
      <input type="text" placeholder="Параметр" value="${k}" id="espec-k-${id}"/>
      <input type="text" placeholder="Значение" value="${v}" id="espec-v-${id}"/>
      <button class="remove-spec" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('e-specs-list').appendChild(row);
  }

  function getSpecs(listId){
    const rows=document.querySelectorAll('#'+listId+' .spec-item-row');
    const specs=[];
    rows.forEach(row=>{
      const inputs=row.querySelectorAll('input');
      const k=inputs[0].value.trim();
      const v=inputs[1].value.trim();
      if(k&&v)specs.push({k,v});
    });
    return specs;
  }

  function previewImg(input){
    const file=input.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      document.getElementById('preview-img').src=e.target.result;
      document.getElementById('preview-wrap').style.display='block';
      document.getElementById('upload-area').style.display='none';
    };
    r.readAsDataURL(file);
  }
  function removeImg(){
    document.getElementById('img-input').value='';
    document.getElementById('preview-wrap').style.display='none';
    document.getElementById('upload-area').style.display='block';
  }

  async function addProduct(){
    const name=document.getElementById('p-name').value.trim();
    const price=document.getElementById('p-price').value.trim();
    const file=document.getElementById('img-input').files[0];
    if(!name||!price||!file){showToast('❌ Введите название, цену и фото!','error-toast');return}
    const btn=document.getElementById('submit-btn');
    btn.disabled=true;btn.textContent='⏳ Загрузка...';
    const r=new FileReader();
    r.onload=async e=>{
      const base64=e.target.result.split(',')[1];
      const ext=file.name.split('.').pop().toLowerCase();
      const body={
        password:adminPassword,name,price,
        category:document.getElementById('p-cat').value,
        phone:document.getElementById('p-phone').value.trim(),
        whatsapp:document.getElementById('p-whatsapp').value.trim(),
        telegram:document.getElementById('p-telegram').value.trim(),
        instagram:document.getElementById('p-instagram').value.trim(),
        specs:getSpecs('specs-list'),
        imageBase64:base64,imageExt:ext
      };
      try{
        const res=await fetch('/api/add-product',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data=await res.json();
        if(data.success){
          showToast('✅ Товар добавлен!','success');
          ['p-name','p-price','p-phone','p-whatsapp','p-telegram','p-instagram'].forEach(id=>document.getElementById(id).value='');
          document.getElementById('specs-list').innerHTML='';
          specCount=0;
          removeImg();loadProducts();
        }else showToast('❌ '+(data.error||'Ошибка'),'error-toast');
      }catch(err){showToast('❌ Ошибка сервера','error-toast')}
      btn.disabled=false;btn.textContent='➕ Добавить товар';
    };
    r.readAsDataURL(file);
  }

  function openEdit(id){
    const p=products.find(x=>x.id===id);if(!p)return;
    document.getElementById('e-id').value=p.id;
    document.getElementById('e-cat').value=p.category||'telefon';
    document.getElementById('e-name').value=p.name||'';
    document.getElementById('e-price').value=p.price||'';
    document.getElementById('e-phone').value=p.phone||'';
    document.getElementById('e-whatsapp').value=p.whatsapp||'';
    document.getElementById('e-telegram').value=p.telegram||'';
    document.getElementById('e-instagram').value=p.instagram||'';
    document.getElementById('e-specs-list').innerHTML='';
    editSpecCount=0;
    const specs=Array.isArray(p.specs)?p.specs:[];
    specs.forEach(s=>addEditSpecRow(s.k,s.v));
    document.getElementById('edit-modal').classList.add('open');
  }

  async function saveEdit(){
    const id=document.getElementById('e-id').value;
    const body={
      password:adminPassword,id,
      category:document.getElementById('e-cat').value,
      name:document.getElementById('e-name').value,
      price:document.getElementById('e-price').value,
      phone:document.getElementById('e-phone').value,
      whatsapp:document.getElementById('e-whatsapp').value,
      telegram:document.getElementById('e-telegram').value,
      instagram:document.getElementById('e-instagram').value,
      specs:getSpecs('e-specs-list')
    };
    try{
      const res=await fetch('/api/add-product',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await res.json();
      if(data.success){showToast('✅ Сохранено!','success');document.getElementById('edit-modal').classList.remove('open');loadProducts()}
      else showToast('❌ '+(data.error||'Ошибка'),'error-toast');
    }catch(e){showToast('❌ Ошибка','error-toast')}
  }

  async function deleteProduct(id){
    if(!confirm('Удалить товар?'))return;
    try{
      const res=await fetch('/api/add-product',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:adminPassword,id})});
      const data=await res.json();
      if(data.success){showToast('🗑️ Удалено!','success');loadProducts()}
      else showToast('❌ '+(data.error||'Ошибка'),'error-toast');
    }catch(e){showToast('❌ Ошибка','error-toast')}
  }

  async function loadProducts(){
    try{
      const res=await fetch('/api/get-products');
      products=await res.json();
      document.getElementById('total-count').textContent=products.length;
      const list=document.getElementById('prod-list');
      if(!products.length){list.innerHTML='<p style="color:var(--muted);font-size:14px;padding:20px 0">Товаров пока нет</p>';return}
      list.innerHTML=products.map((p,i)=>`
        <div class="prod-item" style="animation-delay:${i*0.04}s">
          <img src="${p.image_url}" alt="${p.name}" onerror="this.style.background='#1e1e1e'">
          <div class="prod-info">
            <div class="p-name">${p.name}</div>
            <div class="p-price">${Number(p.price).toLocaleString()} сом</div>
            <div class="p-cat">${p.category==='telefon'?'📱 Телефон':'🎧 Аксессуар'}</div>
          </div>
          <div class="item-btns">
            <button class="edit-btn" onclick="openEdit('${p.id}')">✏️</button>
            <button class="delete-btn" onclick="deleteProduct('${p.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }catch(e){document.getElementById('prod-list').innerHTML='<p style="color:var(--muted)">Ошибка</p>'}
  }
</script>
</body>
</html>
